- name: Automatizacion de servidores
  hosts: servidores
  become: yes

  tasks:
    - name: Gathering Facts
      setup:

    - name: Actualizar paquetes APT
      apt:
        update_cache: yes

    - name: Crear usuario itla
      user:
        name: itla
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Crear carpeta app
      file:
        path: /app
        state: directory
        mode: '0755'

    - name: Crear archivo hola.txt
      copy:
        dest: /app/hola.txt
        content: "Hola desde Ansible\n"
        mode: '0644'

    - name: Instalar cowsay y htop
      apt:
        name:
          - cowsay
          - htop
        state: present